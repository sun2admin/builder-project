name: Build and Push base-ai-layer Images

on:
  push:
    branches:
      - main
    paths:
      - 'Dockerfile'
      - 'init-firewall.sh'
      - '.github/workflows/build-and-push.yml'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/layer1-ai-depends

jobs:
  build-matrix:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - tag: light
            include_extras: "false"
            include_playwright: "false"
            browsers: ""
          - tag: latest
            include_extras: "true"
            include_playwright: "false"
            browsers: ""
          - tag: playwright_with_chromium
            include_extras: "true"
            include_playwright: "true"
            browsers: "chromium"
          - tag: playwright_with_firefox
            include_extras: "true"
            include_playwright: "true"
            browsers: "firefox"
          - tag: playwright_with_safari
            include_extras: "true"
            include_playwright: "true"
            browsers: "webkit"
          - tag: playwright_with_all
            include_extras: "true"
            include_playwright: "true"
            browsers: "chromium firefox webkit"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ matrix.tag }}
          build-args: |
            INCLUDE_EXTRAS=${{ matrix.include_extras }}
            INCLUDE_PLAYWRIGHT=${{ matrix.include_playwright }}
            BROWSERS=${{ matrix.browsers }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
